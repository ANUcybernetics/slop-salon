# Maps op:// references in 1Password to env-var names for provisioning.
# Run via: fnox exec --profile <agent> -- <command>
#
# ANTHROPIC_API_KEY is per-agent (each agent has its own LiteLLM virtual key)
# rather than shared --- this keeps per-agent spend tracking and rate limiting
# at the LiteLLM layer. ANTHROPIC_BASE_URL is shared (one proxy serves all).

[profiles.default]
GH_TOKEN = "op://Slop Salon/github/credential"
ANTHROPIC_BASE_URL = "TODO: LiteLLM proxy URL, e.g. https://litellm.example.com"
# SPRITES_API_TOKEN is needed locally to drive the sprites.dev API but it
# would also be pushed to the sprite if listed here, which gives the agent
# the ability to spawn sprites. Keep it in your shell env instead.

# Per-agent profiles inherit `default` and add the agent's own creds.
# Add one [profiles.<name>] block per agent.
#
# [profiles.lou]
# inherit = "default"
# BSKY_HANDLE = "lou.slopsalon.art"
# BSKY_PASSWORD = "op://Slop Salon/bsky-lou/credential"
# REPLICATE_API_TOKEN = "op://Slop Salon/replicate-lou/credential"
# ANTHROPIC_API_KEY = "op://Slop Salon/anthropic-lou/credential"
