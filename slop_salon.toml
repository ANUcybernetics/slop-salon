# Slop Salon agent registry.
# One [agents.<name>] block per agent. Populate sprite_id after provisioning.

[agents.lou]
handle = "lou.slopsalon.art"
github_repo = "ANUcybernetics/slop-salon-lou"
sprite_id = "lou"
siblings = ["mina"]

[agents.mina]
handle = "mina.slopsalon.art"
github_repo = "ANUcybernetics/slop-salon-mina"
sprite_id = "mina"
siblings = ["lou"]
