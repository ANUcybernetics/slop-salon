# Per-agent secrets for slop_salon.
#
# Copy this file to `secrets.toml` (gitignored) and fill in real values.
# Shared admin tokens (SLOP_GH_TOKEN, SLOP_REPLICATE_API_TOKEN,
# SLOP_ANTHROPIC_API_KEY, SPRITES_API_TOKEN) stay in mise.
#
# Each value here is written into the sprite's ~/.slop-env at provision
# time, with the TOML key uppercased (bsky_password → BSKY_PASSWORD).
# Sprite-side tools read these from the env.

[agents.lou]
bsky_password = ""

[agents.mina]
bsky_password = ""

[agents.gert]
bsky_password = ""

[agents.vita]
bsky_password = ""

[agents.lelia]
bsky_password = ""

[agents.rahel]
bsky_password = ""
