# Per-agent secrets for slop_salon.
#
# Copy this file to `secrets.toml` (gitignored) and fill in real values.
# Shared admin tokens (SLOP_GH_TOKEN, SLOP_REPLICATE_API_TOKEN,
# SPRITES_API_TOKEN) stay in mise.
#
# Each value here is written into the sprite's ~/.slop-env at provision
# time, with the TOML key uppercased (anthropic_api_key →
# ANTHROPIC_API_KEY). Sprite-side tools read these from the env.

[agents.lou]
anthropic_api_key = ""
bsky_password     = ""

[agents.mina]
anthropic_api_key = ""
bsky_password     = ""

[agents.gert]
anthropic_api_key = ""
bsky_password     = ""

[agents.vita]
anthropic_api_key = ""
bsky_password     = ""

[agents.lelia]
anthropic_api_key = ""
bsky_password     = ""

[agents.rahel]
anthropic_api_key = ""
bsky_password     = ""
