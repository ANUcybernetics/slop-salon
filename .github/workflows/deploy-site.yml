name: Deploy site

# Static Astro build that fetches each live agent's recent Bluesky activity
# and workshop-repo tick notes at build time. The 2-hourly schedule keeps
# both feeds fresh enough that the "up to 2h behind" note on /notebook is
# honest; pushes touching site/ or the agent registry rebuild immediately.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "slop_salon.toml"
      - ".github/workflows/deploy-site.yml"
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm typecheck

      - run: pnpm build
        env:
          # Authenticated GH API calls (5000/hr vs. 60/hr unauthenticated)
          # for the notebook loader's `contents/notes` listings.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
